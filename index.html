<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Counter</title>
    <style>
        :root {
            --primary-color: #4a6fa5;
            --secondary-color: #166088;
            --accent-color: #4fc3f7;
            --text-color: #333;
            --light-gray: #f5f5f5;
            --white: #ffffff;
            --border-radius: 8px;
            --box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--light-gray);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: var(--secondary-color);
            margin-bottom: 30px;
            font-weight: 600;
        }

        .container {
            background-color: var(--white);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group.small-input input {
            padding: 8px;
            font-size: 14px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--secondary-color);
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(79, 195, 247, 0.2);
        }

        .advanced-settings-toggle {
            margin-bottom: 15px;
            text-align: center;
        }

        .advanced-toggle-btn {
            background: none;
            border: none;
            color: var(--secondary-color);
            cursor: pointer;
            font-size: 14px;
            padding: 5px 10px;
            border-radius: var(--border-radius);
            transition: background-color 0.2s;
        }

        .advanced-toggle-btn:hover {
            background-color: rgba(22, 96, 136, 0.1);
        }

        .advanced-settings {
            display: none;
            margin-bottom: 20px;
            padding: 15px;
            background-color: rgba(74, 111, 165, 0.05);
            border-radius: var(--border-radius);
            border: 1px dashed rgba(22, 96, 136, 0.2);
        }

        .advanced-settings.show {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: var(--border-radius);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        #pauseBtn {
            background-color: #ff9800;
            color: var(--white);
        }

        #continueBtn {
            background-color: #4caf50;
            color: var(--white);
        }

        #stopBtn {
            background-color: #f44336;
            color: var(--white);
        }

        .display-group {
            background-color: var(--primary-color);
            color: var(--white);
            padding: 20px;
            border-radius: var(--border-radius);
            margin-top: 20px;
            box-shadow: var(--box-shadow);
        }

        #elapsedTime, #goalDisplay, #moneyEarned {
            font-size: 20px;
            margin: 10px 0;
            font-weight: 500;
        }

        #moneyEarned {
            font-size: 28px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            padding-top: 15px;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Money Counter</h1>
        
        <div class="input-group">
            <label for="rate">€ / hour:</label>
            <input type="number" id="rate" placeholder="Enter rate" step="0.01">
        </div>

        <div class="input-group">
            <label for="time">Hours so far (hh:mm):</label>
            <input type="text" id="time" placeholder="00:00">
        </div>

        <div class="input-group">
            <label for="goal">Goal (€):</label>
            <input type="number" id="goal" placeholder="Enter goal (optional)" step="0.01">
        </div>

        <div class="advanced-settings-toggle">
            <button id="advancedToggle" class="advanced-toggle-btn">⚙️ Advanced Settings</button>
        </div>

        <div class="advanced-settings" id="advancedSettings">
            <div class="input-group small-input">
                <label for="leftPadding">Left Padding:</label>
                <input type="text" id="leftPadding" placeholder="Leave empty for default _ padding">
            </div>

            <div class="input-group small-input">
                <label for="rightPadding">Right Padding:</label>
                <input type="text" id="rightPadding" placeholder="Leave empty for default _ padding">
            </div>
        </div>

        <div class="button-group">
            <button id="pauseBtn">Pause</button>
            <button id="continueBtn">Continue</button>
            <button id="stopBtn">Stop</button>
        </div>

        <div class="display-group">
            <div id="elapsedTime">Elapsed Time: 00:00:00</div>
            <div id="goalDisplay">Current: €0.00</div>
            <div id="moneyEarned">Money Earned: €0.00</div>
        </div>
    </div>

    <script>
        let isRunning = false;
        let startTime = null;
        let rate = 0;
        let elapsedHours = 0;
        let goal = 0;

        const rateInput = document.getElementById('rate');
        const timeInput = document.getElementById('time');
        const goalInput = document.getElementById('goal');
        const leftPaddingInput = document.getElementById('leftPadding');
        const rightPaddingInput = document.getElementById('rightPadding');
        const elapsedTimeDiv = document.getElementById('elapsedTime');
        const goalDisplayDiv = document.getElementById('goalDisplay');
        const moneyEarnedDiv = document.getElementById('moneyEarned');
        const pauseBtn = document.getElementById('pauseBtn');
        const continueBtn = document.getElementById('continueBtn');
        const stopBtn = document.getElementById('stopBtn');
        const advancedToggle = document.getElementById('advancedToggle');
        const advancedSettings = document.getElementById('advancedSettings');

        // Load saved data from localStorage
        function loadData() {
            const savedData = localStorage.getItem('moneyCounterData');
            if (savedData) {
                const data = JSON.parse(savedData);
                rateInput.value = data.rate || 0;
                timeInput.value = data.time || '00:00';
                goalInput.value = data.goal || '';
                leftPaddingInput.value = data.leftPadding || '';
                rightPaddingInput.value = data.rightPadding || '';
                isRunning = data.isRunning || false;
                startTime = data.startTime || null;
                elapsedHours = data.elapsedHours || 0;
                rate = parseFloat(rateInput.value) || 0;
                goal = parseFloat(goalInput.value) || 0;
                
                if (isRunning && startTime) {
                    updateTimer();
                } else {
                    updateMoneyEarned();
                }
            }
        }

        // Save data to localStorage
        function saveData() {
            const data = {
                rate: rateInput.value,
                time: timeInput.value,
                goal: goalInput.value,
                leftPadding: leftPaddingInput.value,
                rightPadding: rightPaddingInput.value,
                isRunning: isRunning,
                startTime: startTime,
                elapsedHours: elapsedHours
            };
            localStorage.setItem('moneyCounterData', JSON.stringify(data));
        }

        // Toggle advanced settings visibility
        function toggleAdvancedSettings() {
            advancedSettings.classList.toggle('show');
            const isShowing = advancedSettings.classList.contains('show');
            advancedToggle.textContent = isShowing ? '⚙️ Hide Advanced Settings' : '⚙️ Advanced Settings';
        }

        // Stop the timer and add elapsed time to "Hours so far"
        function stopTimer() {
            if (isRunning) {
                isRunning = false;
                startTime = null;
            }
            
            // Add elapsed time to "Hours so far"
            const timeParts = timeInput.value.split(':');
            let hours = parseInt(timeParts[0]) || 0;
            let minutes = parseInt(timeParts[1]) || 0;
            
            // Convert elapsedHours to hours and minutes
            const additionalHours = Math.floor(elapsedHours);
            const additionalMinutes = Math.floor((elapsedHours - additionalHours) * 60);
            
            hours += additionalHours;
            minutes += additionalMinutes;
            
            // Handle overflow in minutes
            if (minutes >= 60) {
                hours += Math.floor(minutes / 60);
                minutes = minutes % 60;
            }
            
            timeInput.value = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            
            // Reset elapsed time
            elapsedHours = 0;
            elapsedTimeDiv.textContent = 'Elapsed Time: 00:00:00';
            
            updateMoneyEarned();
            saveData();
        }

        // Event listeners
        rateInput.addEventListener('change', () => {
            updateMoneyEarned();
            saveData();
        });
        timeInput.addEventListener('change', () => {
            updateMoneyEarned();
            saveData();
        });
        goalInput.addEventListener('change', () => {
            updateMoneyEarned();
            saveData();
        });
        leftPaddingInput.addEventListener('change', () => {
            updateMoneyEarned();
            saveData();
        });
        rightPaddingInput.addEventListener('change', () => {
            updateMoneyEarned();
            saveData();
        });
        pauseBtn.addEventListener('click', () => {
            pauseTimer();
            saveData();
        });
        continueBtn.addEventListener('click', () => {
            continueTimer();
            saveData();
        });
        stopBtn.addEventListener('click', () => {
            stopTimer();
        });
        advancedToggle.addEventListener('click', toggleAdvancedSettings);

        function updateMoneyEarned() {
            rate = parseFloat(rateInput.value) || 0;
            goal = parseFloat(goalInput.value) || 0;
            const timeParts = timeInput.value.split(':');
            const hours = parseInt(timeParts[0]) || 0;
            const minutes = parseInt(timeParts[1]) || 0;
            const totalHours = hours + minutes / 60 + elapsedHours;
            const moneyEarned = rate * totalHours;
            
            moneyEarnedDiv.textContent = `Money Earned: €${moneyEarned.toFixed(2)}`;
            
            const title_length = 25;
            const leftPadding = leftPaddingInput.value;
            const rightPadding = rightPaddingInput.value;
            
            // Update goal display
            if (goal > 0) {
                const percentage = Math.round((moneyEarned / goal) * 100);
                goalDisplayDiv.textContent = `${moneyEarned.toFixed(2)}€ / ${goal.toFixed(2)}€ (${percentage}%)`;
                
                // Update title with percentage and earned money
                const titleContent = `${percentage}%: ${moneyEarned.toFixed(2)}€`;
                let title = titleContent;
                if (titleContent.length < title_length) {
                    if (leftPadding || rightPadding) {
                        // Use custom padding
                        const leftPad = leftPadding || '';
                        const rightPad = rightPadding || '';
                        title = `${leftPad}${titleContent}${rightPad}`;
                        // Trim to title_length if needed
                        if (title.length > title_length) {
                            title = title.substring(0, title_length);
                        }
                    } else {
                        // Use default underscore padding
                        const underscoresNeeded = title_length - titleContent.length;
                        const leftUnderscores = Math.floor(underscoresNeeded / 2);
                        const rightUnderscores = underscoresNeeded - leftUnderscores;
                        title = `${'_'.repeat(leftUnderscores)}${titleContent}${'_'.repeat(rightUnderscores)}`;
                    }
                }
                document.title = title;
            } else {
                goalDisplayDiv.textContent = `Current: €${moneyEarned.toFixed(2)}`;
                
                // Update title with earned money only
                const titleContent = `€${moneyEarned.toFixed(2)}`;
                let title = titleContent;
                if (titleContent.length < title_length) {
                    if (leftPadding || rightPadding) {
                        // Use custom padding
                        const leftPad = leftPadding || '';
                        const rightPad = rightPadding || '';
                        title = `${leftPad}${titleContent}${rightPad}`;
                        // Trim to title_length if needed
                        if (title.length > title_length) {
                            title = title.substring(0, title_length);
                        }
                    } else {
                        // Use default underscore padding
                        const underscoresNeeded = title_length - titleContent.length;
                        const leftUnderscores = Math.floor(underscoresNeeded / 2);
                        const rightUnderscores = underscoresNeeded - leftUnderscores;
                        title = `${'_'.repeat(leftUnderscores)}${titleContent}${'_'.repeat(rightUnderscores)}`;
                    }
                }
                document.title = title;
            }
        }

        function pauseTimer() {
            if (isRunning) {
                isRunning = false;
            }
        }

        function continueTimer() {
            if (!isRunning) {
                isRunning = true;
                if (!startTime) {
                    startTime = Date.now();
                }
                updateTimer();
            }
        }

        function updateTimer() {
            if (isRunning) {
                const elapsedTime = Date.now() - startTime;
                const hours = Math.floor(elapsedTime / 3600000);
                const minutes = Math.floor((elapsedTime % 3600000) / 60000);
                const seconds = Math.floor((elapsedTime % 60000) / 1000);
                elapsedHours = hours + minutes / 60 + seconds / 3600;
                elapsedTimeDiv.textContent = `Elapsed Time: ${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                updateMoneyEarned();
                saveData();
                setTimeout(updateTimer, 1000);
            }
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
